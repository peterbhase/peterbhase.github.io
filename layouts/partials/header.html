<div class="profile">
  {{ with .Site.Params.photo }}
  <img class="avatar" src="{{ . | relURL }}" alt="{{ $.Site.Params.author }}">
  {{ end }}
  <div class="profile-text">
    <h1 class="name"><a href="{{ "/" | relURL }}">{{ .Site.Params.author }}</a></h1>
    <p class="affil">Schmidt Sciences, Stanford University</p>
    <ul class="links">
      <li><a href="mailto:{{ .Site.Params.email }}"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M2 5.5A1.5 1.5 0 0 1 3.5 4h17A1.5 1.5 0 0 1 22 5.5v13A1.5 1.5 0 0 1 20.5 20h-17A1.5 1.5 0 0 1 2 18.5v-13Zm2.2.5 7.8 5.6L19.8 6H4.2ZM20 7.3l-7.4 5.3a1 1 0 0 1-1.2 0L4 7.3V18h16V7.3Z"/></svg>{{ .Site.Params.email }}</a></li>
      <li><a href="{{ .Site.Params.twitter }}"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/></svg>Tweets</a></li>
      <li class="loc"><svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z"/></svg>{{ .Site.Params.location }}</li>
    </ul>
  </div>
</div>
